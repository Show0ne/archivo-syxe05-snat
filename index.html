<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<title>SyXe'05 / Snat Reverse Engineering Archive</title><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script><style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
color:#111;
}

.dark{
background:#121212;
color:#ddd;
}

.layout{
display:flex;
height:100vh;
}

.sidebar{
width:340px;
background:#1e1e1e;
color:white;
overflow:auto;
padding:20px;
}

.sidebar h3{
margin-top:20px;
border-bottom:1px solid #333;
padding-bottom:5px;
}

.sidebar a{
display:block;
color:#9cdcfe;
text-decoration:none;
padding:3px 0;
cursor:pointer;
font-size:14px;
}

.sidebar a:hover{
text-decoration:underline;
}

.search{
width:100%;
padding:8px;
margin-bottom:15px;
font-size:14px;
}

.category{
margin-bottom:10px;
}

.content{
flex:1;
overflow:auto;
padding:40px;
background:white;
}

.dark .content{
background:#1a1a1a;
}

.viewer pre{
background:#111;
padding:12px;
overflow:auto;
}

.toc{
background:#f0f0f0;
padding:15px;
margin-bottom:25px;
border-radius:5px;
}

.dark .toc{
background:#222;
}

.toc a{
display:block;
text-decoration:none;
color:#0366d6;
}

.toggle{
position:fixed;
top:15px;
right:20px;
padding:6px 10px;
cursor:pointer;
background:#444;
color:white;
border-radius:4px;
font-size:13px;
}

</style></head><body><div class="toggle" onclick="toggleTheme()">🌙 Theme</div><div class="layout"><div class="sidebar"><h2>Reverse Engineering Archive</h2><input class="search" id="search" placeholder="Search tutorial"><h3>Reversing</h3>
<div id="rev"></div><h3>Unpacking</h3>
<div id="unpack"></div></div><div class="content"><div id="viewer" class="viewer"><h1>SyXe'05 / Snat Archive</h1><p>Historical reverse engineering and unpacking tutorials.</p><p>
Author: <b>SyXe'05 / Snat</b><br>
Group: <b>CracksLatinos</b>
</p><p>Select a tutorial from the sidebar.</p></div></div></div><script>

const repo="Show0ne/archivo-syxe05-snat";

const tutorials={};

function detectCategory(name){

name=name.toLowerCase();

if(name.includes("themida")) return "Themida";
if(name.includes("armadillo")) return "Armadillo";
if(name.includes("asprotect")) return "ASProtect";
if(name.includes("vmprotect")) return "VMProtect";
if(name.includes("securom")) return "SecuROM";

return "Other";

}

async function load(path,container){

const url=`https://api.github.com/repos/${repo}/contents/${path}`;
const response=await fetch(url);
const files=await response.json();

const categories={};

files
.filter(f=>f.name.endsWith(".md"))
.sort((a,b)=>a.name.localeCompare(b.name))
.forEach(file=>{

const id=file.name.replace(".md","");

tutorials[id]=file.download_url;

const cat=detectCategory(id);

if(!categories[cat]) categories[cat]=[];

categories[cat].push(id);

});

const sidebar=document.getElementById(container);

Object.keys(categories).sort().forEach(cat=>{

const div=document.createElement("div");
div.className="category";

const title=document.createElement("b");
title.textContent=cat;

div.appendChild(title);

categories[cat].forEach(id=>{

const a=document.createElement("a");

a.textContent=id;

a.onclick=()=>{
loadTutorial(id);
};

div.appendChild(a);

});

sidebar.appendChild(div);

});

}

async function loadTutorial(id){

if(!tutorials[id]) return;

location.hash="tutorial/"+id;

const raw=await fetch(tutorials[id]);
const md=await raw.text();

document.getElementById("viewer").innerHTML=
marked.parse(md);

generateTOC();

document.querySelectorAll("pre code").forEach((block)=>{
hljs.highlightElement(block);
});

window.scrollTo(0,0);

}

function generateTOC(){

const viewer=document.getElementById("viewer");

const headers=viewer.querySelectorAll("h1,h2,h3");

if(headers.length===0) return;

let toc='<div class="toc"><b>Table of Contents</b>';

headers.forEach((h,i)=>{

const id="section_"+i;

h.id=id;

toc+=`<a href="#${id}">${h.innerText}</a>`;

});

toc+='</div>';

viewer.insertAdjacentHTML("afterbegin",toc);

}

function toggleTheme(){

document.body.classList.toggle("dark");

localStorage.setItem("theme",
document.body.classList.contains("dark")?"dark":"light");

}

function loadTheme(){

const saved=localStorage.getItem("theme");

if(saved==="dark"){
document.body.classList.add("dark");
return;
}

if(!saved && window.matchMedia("(prefers-color-scheme: dark)").matches){
document.body.classList.add("dark");
}

}

load("reversing/software","rev");
load("unpacking","unpack");

document.getElementById("search").addEventListener("input",function(){

const filter=this.value.toLowerCase();

document.querySelectorAll(".sidebar a").forEach(a=>{

const text=a.textContent.toLowerCase();

a.style.display=text.includes(filter)?"block":"none";

});

});

loadTheme();

</script></body>
</html>
