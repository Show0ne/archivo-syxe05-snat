<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<title>SyXe'05 / Snat Reverse Engineering Archive</title><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
}

.layout{
display:flex;
height:100vh;
}

.sidebar{
width:320px;
background:#1e1e1e;
color:white;
overflow:auto;
padding:20px;
}

.sidebar h2{
margin-top:0;
font-size:20px;
}

.sidebar a{
color:#9cdcfe;
text-decoration:none;
cursor:pointer;
display:block;
padding:4px 0;
}

.sidebar a:hover{
text-decoration:underline;
}

.content{
flex:1;
overflow:auto;
padding:40px;
background:white;
}

.search{
width:100%;
padding:8px;
margin-bottom:15px;
font-size:14px;
}

.viewer pre{
background:#eee;
padding:12px;
overflow:auto;
}

.viewer code{
background:#eee;
padding:2px 4px;
border-radius:3px;
}

.section{
margin-top:20px;
}

.stats{
font-size:13px;
color:#bbb;
margin-bottom:10px;
}

</style></head><body><div class="layout"><div class="sidebar"><h2>Reverse Engineering Archive</h2><div class="stats" id="stats"></div><input class="search" id="search" placeholder="Search tutorial"><div class="section">
<h3>Reversing</h3>
<div id="rev"></div>
</div><div class="section">
<h3>Unpacking</h3>
<div id="unpack"></div>
</div></div><div class="content"><div id="viewer" class="viewer"><h1>SyXe'05 / Snat Archive</h1><p>
Historical reverse engineering and unpacking tutorials.
</p><p>
Author: <b>SyXe'05 / Snat</b><br>
Group: <b>CracksLatinos</b>
</p><p>
Select a tutorial from the sidebar.
</p></div></div></div><script>

const repo="Show0ne/archivo-syxe05-snat";

let total=0;

async function load(path,container){

const url=`https://api.github.com/repos/${repo}/contents/${path}`;
const response=await fetch(url);
const files=await response.json();

const list=document.getElementById(container);

const markdown=files
.filter(f=>f.name.endsWith(".md"))
.sort((a,b)=>a.name.localeCompare(b.name));

total+=markdown.length;

markdown.forEach(file=>{

const a=document.createElement("a");

a.textContent=file.name.replace(".md","");

a.onclick=async()=>{

const raw=await fetch(file.download_url);
const md=await raw.text();

document.getElementById("viewer").innerHTML=
marked.parse(md);

window.scrollTo(0,0);

};

list.appendChild(a);

});

document.getElementById("stats").textContent=
total+" tutorials in archive";

}

load("reversing/software","rev");
load("unpacking","unpack");

document.getElementById("search").addEventListener("input",function(){

const filter=this.value.toLowerCase();

document.querySelectorAll(".sidebar a").forEach(a=>{

const text=a.textContent.toLowerCase();

a.style.display=text.includes(filter)?"block":"none";

});

});

</script></body>
</html>
