<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SyXe'05 / Snat Reverse Engineering Archive</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 40px;
    background: #f4f4f4;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 6px;
    max-width: 900px;
}

h1 {
    margin-top: 0;
}

h2 {
    margin-top: 30px;
}

input {
    padding: 8px;
    width: 100%;
    margin-bottom: 20px;
    font-size: 14px;
}

a {
    text-decoration: none;
    color: #0366d6;
}

a:hover {
    text-decoration: underline;
}

li {
    margin: 4px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>SyXe'05 / Snat Reverse Engineering Archive</h1>

<p>
Historical archive of reverse engineering and unpacking tutorials written between the early 2000s and later years.
</p>

<p>
<b>Author:</b> SyXe'05 / Snat<br>
<b>Group:</b> CracksLatinos
</p>

<input id="search" placeholder="Search tutorial...">

<h2>Reversing Tutorials</h2>
<ul id="reversing"></ul>

<h2>Unpacking Tutorials</h2>
<ul id="unpacking"></ul>

</div>

<script>

const repo = "Show0ne/archivo-syxe05-snat";

async function load(path, elementId) {

    const url = `https://api.github.com/repos/${repo}/contents/${path}`;

    const response = await fetch(url);
    const files = await response.json();

    const list = document.getElementById(elementId);

    files.forEach(file => {

        if (file.name.endsWith(".md")) {

            const li = document.createElement("li");

            const a = document.createElement("a");

            const raw = file.download_url;

            a.href = raw;
            a.textContent = file.name.replace(".md","");

            li.appendChild(a);

            list.appendChild(li);
        }

    });
}

load("reversing/software","reversing");
load("unpacking","unpacking");

document.getElementById("search").addEventListener("input", function() {

    const filter = this.value.toLowerCase();

    document.querySelectorAll("li").forEach(li => {

        const text = li.textContent.toLowerCase();

        li.style.display = text.includes(filter) ? "" : "none";

    });

});

</script>

</body>
</html>
