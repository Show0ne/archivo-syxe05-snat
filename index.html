<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<title>SyXe'05 / Snat Reverse Engineering Archive</title><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script><style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
}

.layout{
display:flex;
height:100vh;
}

.sidebar{
width:320px;
background:#1e1e1e;
color:white;
overflow:auto;
padding:20px;
}

.sidebar h2{
margin-top:0;
}

.sidebar a{
display:block;
color:#9cdcfe;
text-decoration:none;
padding:4px 0;
cursor:pointer;
}

.sidebar a:hover{
text-decoration:underline;
}

.search{
width:100%;
padding:8px;
margin-bottom:15px;
font-size:14px;
}

.section{
margin-top:20px;
}

.content{
flex:1;
overflow:auto;
padding:40px;
background:white;
}

.viewer pre{
background:#111;
padding:12px;
overflow:auto;
}

.viewer code{
border-radius:3px;
}

</style></head><body><div class="layout"><div class="sidebar"><h2>Reverse Engineering Archive</h2><input class="search" id="search" placeholder="Search tutorial"><div class="section">
<h3>Reversing</h3>
<div id="rev"></div>
</div><div class="section">
<h3>Unpacking</h3>
<div id="unpack"></div>
</div></div><div class="content"><div id="viewer" class="viewer"><h1>SyXe'05 / Snat Archive</h1><p>Historical reverse engineering and unpacking tutorials.</p><p>
Author: <b>SyXe'05 / Snat</b><br>
Group: <b>CracksLatinos</b>
</p><p>Select a tutorial from the sidebar.</p></div></div></div><script>

const repo="Show0ne/archivo-syxe05-snat";

const tutorials={};

async function load(path,container){

const url=`https://api.github.com/repos/${repo}/contents/${path}`;
const response=await fetch(url);
const files=await response.json();

const list=document.getElementById(container);

files
.filter(f=>f.name.endsWith(".md"))
.sort((a,b)=>a.name.localeCompare(b.name))
.forEach(file=>{

const id=file.name.replace(".md","");

tutorials[id]=file.download_url;

const a=document.createElement("a");

a.textContent=id;

a.onclick=()=>{
loadTutorial(id);
};

list.appendChild(a);

});

}

async function loadTutorial(id){

if(!tutorials[id]) return;

location.hash="tutorial/"+id;

const raw=await fetch(tutorials[id]);
const md=await raw.text();

document.getElementById("viewer").innerHTML=
marked.parse(md);

document.querySelectorAll("pre code").forEach((block)=>{
hljs.highlightElement(block);
});

window.scrollTo(0,0);

}

function checkHash(){

const hash=location.hash;

if(hash.startsWith("#tutorial/")){

const id=hash.replace("#tutorial/","");

loadTutorial(id);

}

}

load("reversing/software","rev");
load("unpacking","unpack");

window.addEventListener("hashchange",checkHash);
setTimeout(checkHash,500);

document.getElementById("search").addEventListener("input",function(){

const filter=this.value.toLowerCase();

document.querySelectorAll(".sidebar a").forEach(a=>{

const text=a.textContent.toLowerCase();

a.style.display=text.includes(filter)?"block":"none";

});

});

</script></body>
</html>
