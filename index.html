<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<title>SyXe'05 / Snat Reverse Engineering Archive</title><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><style>

body{
font-family: Arial, sans-serif;
margin:40px;
background:#f4f4f4;
}

.container{
background:white;
padding:25px;
border-radius:6px;
max-width:1000px;
}

h1{
margin-top:0;
}

.section{
margin-top:35px;
}

input{
padding:8px;
width:100%;
margin-bottom:20px;
font-size:14px;
}

a{
text-decoration:none;
color:#0366d6;
cursor:pointer;
}

a:hover{
text-decoration:underline;
}

li{
margin:5px 0;
}

.viewer{
margin-top:40px;
padding-top:25px;
border-top:1px solid #ddd;
}

.viewer pre{
background:#eee;
padding:12px;
overflow:auto;
}

.viewer code{
background:#eee;
padding:2px 4px;
border-radius:3px;
}

.stats{
margin-top:10px;
color:#666;
font-size:14px;
}

</style></head><body><div class="container"><h1>SyXe'05 / Snat Reverse Engineering Archive</h1><p>
Historical archive of reverse engineering and unpacking tutorials written between the early 2000s and later years.
</p><p>
<b>Author:</b> SyXe'05 / Snat<br>
<b>Group:</b> CracksLatinos
</p><div class="stats">
<span id="total"></span>
</div><input id="search" placeholder="Search tutorial..."><div class="section">
<h2>Reversing Tutorials (<span id="count_rev">0</span>)</h2>
<ul id="reversing"></ul>
</div><div class="section">
<h2>Unpacking Tutorials (<span id="count_unpack">0</span>)</h2>
<ul id="unpacking"></ul>
</div><div class="viewer" id="viewer"></div></div><script>

const repo="Show0ne/archivo-syxe05-snat";

let total=0;

async function load(path,id,count_id){

const url=`https://api.github.com/repos/${repo}/contents/${path}`;
const response=await fetch(url);
const files=await response.json();

const list=document.getElementById(id);

const markdown=files
.filter(f=>f.name.endsWith(".md"))
.sort((a,b)=>a.name.localeCompare(b.name));

document.getElementById(count_id).textContent=markdown.length;

total+=markdown.length;

markdown.forEach(file=>{

const li=document.createElement("li");
const a=document.createElement("a");

a.textContent=file.name.replace(".md","");

a.onclick=async()=>{

const raw=await fetch(file.download_url);
const md=await raw.text();

document.getElementById("viewer").innerHTML=
marked.parse(md);

window.scrollTo(0,document.body.scrollHeight);

};

li.appendChild(a);
list.appendChild(li);

});

document.getElementById("total").textContent=
"Total tutorials in archive: "+total;

}

load("reversing/software","reversing","count_rev");
load("unpacking","unpacking","count_unpack");

document.getElementById("search").addEventListener("input",function(){

const filter=this.value.toLowerCase();

document.querySelectorAll("li").forEach(li=>{

const text=li.textContent.toLowerCase();
li.style.display=text.includes(filter)?"":"none";

});

});

</script></body>
</html>
